            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1) rotate(-2deg); }
            50% { transform: scale(1.05) rotate(-1deg); }
        }

            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

            animation: logoPulse 4s ease-in-out infinite;
        }

        .glass-card {
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .energy-gradient {
            background: linear-gradient(135deg, #4be277 0%, #00a572 100%);
        }

        /* Floating label logic */
        .input-group input:placeholder-shown ~ label {
            top: 1rem;
            font-size: 1rem;
            color: #869585;
        }

        .input-group input:focus ~ label,
        .input-group input:not(:placeholder-shown) ~ label {
            top: -0.5rem;
            left: 0.75rem;
            font-size: 0.75rem;
            color: #4be277;
            background-color: #1e1e1e;
            padding: 0 4px;
        }
    </style>

<body class="bg-background text-on-background font-body-md selection:bg-primary selection:text-on-primary min-h-screen overflow-x-hidden">
<!-- Background Layer with Sports Theme -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-black/60 z-10"></div>
<div class="w-full h-full bg-cover bg-center opacity-40 scale-110" data-alt="A moody, high-contrast wide shot of a professional football pitch at night under glowing stadium floodlights. The grass is vibrant emerald green with sharp white lines, partially obscured by a cinematic dark mist. The atmosphere is intense and athletic, with deep charcoal and black shadows grounding the high-performance sports aesthetic. Lens flares from the lights add a premium, energetic feel to the composition." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCNgBJlBY97_QaewYW2r-DjSlc7y1DcxBuTyd2FT01aWpOMDdC6E5Ojftib57g020fqnyp0_maN4R5MEHbvA5mKvbvL62-rTz8r9ur1HeYAdQRNcHj2N8UkRNLsr6n30pKT8wvR2ALUnlrVoH30n83mprQd7LqD0c88IYJTTyGNiDVyADu8naOoqsrI2DdszdWsC6qGeg9DMNEPKErslJTkraaMEw-PLU4zYb0RM7Qzcqh4FeFxhc1IHMBcbbO-zGz4b_LtpTKBW06d')">
</div>
</div>
<!-- Main Content Wrapper -->
<main class="relative z-20 flex flex-col items-center justify-center min-h-screen px-margin-mobile md:px-margin-desktop py-xl">
<!-- Logo Area -->
<div class="mb-xl text-center animate-fade-in-up" style="animation-delay: 0.1s;">
<div class="animate-logo inline-block mb-sm">
<span class="material-symbols-outlined text-primary text-[64px] leading-none" style="font-variation-settings: 'FILL' 1;">sports_soccer</span>
</div>
<h1 class="font-display-lg text-display-lg text-primary italic tracking-tighter uppercase">GOAL</h1>
<p class="font-title-md text-title-md text-on-surface-variant mt-xs">Secure your pitch. Own the game.</p>
</div>
<!-- Glassmorphism Form Card -->
<div class="w-full max-w-md glass-card rounded-xl p-lg md:p-xl shadow-2xl animate-fade-in-up" style="animation-delay: 0.3s;">
<form class="space-y-lg" onsubmit="event.preventDefault();">
<!-- Email Input Group -->
<div class="input-group relative">
<input class="w-full bg-surface-container-low border border-white/10 rounded-lg px-md py-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-300" id="email" name="email" placeholder=" " required="" type="email"/>
<label class="absolute left-md transition-all duration-300 pointer-events-none font-label-sm uppercase tracking-wider" for="email">Email Address</label>
</div>
<!-- Password Input Group -->
<div class="input-group relative">
<input class="w-full bg-surface-container-low border border-white/10 rounded-lg px-md py-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-300" id="password" name="password" placeholder=" " required="" type="password"/>
<label class="absolute left-md transition-all duration-300 pointer-events-none font-label-sm uppercase tracking-wider" for="password">Password</label>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
<div class="flex items-center justify-between">
<label class="flex items-center space-x-sm cursor-pointer group">
<input class="w-5 h-5 rounded border-white/20 bg-surface-container-low text-primary focus:ring-primary focus:ring-offset-background" type="checkbox"/>
<span class="font-label-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Remember Me</span>
</label>
<a class="font-label-sm text-primary hover:underline transition-all" href="#">Forgot Password?</a>
</div>
<!-- Primary Action Button -->
<button class="energy-gradient w-full py-md rounded-lg font-title-md text-on-primary-fixed uppercase tracking-widest shadow-lg active:scale-95 transition-transform duration-200 flex items-center justify-center space-x-sm" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Separator -->
<div class="relative my-xl flex items-center">
<div class="flex-grow border-t border-white/10"></div>
<span class="mx-md font-label-sm text-on-surface-variant uppercase tracking-tighter">Or continue with</span>
<div class="flex-grow border-t border-white/10"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center py-sm px-md rounded-lg bg-surface-container-high border border-white/5 hover:bg-surface-bright transition-colors active:scale-95 duration-200">
<div class="w-6 h-6 mr-sm flex items-center justify-center">
<span class="material-symbols-outlined text-primary">google</span>
</div>
<span class="font-label-sm uppercase">Google</span>
</button>
<button class="flex items-center justify-center py-sm px-md rounded-lg bg-surface-container-high border border-white/5 hover:bg-surface-bright transition-colors active:scale-95 duration-200">
<div class="w-6 h-6 mr-sm flex items-center justify-center">
<span class="material-symbols-outlined text-primary">apps</span>
</div>
<span class="font-label-sm uppercase">Apple</span>
</button>
</div>
</div>
<!-- Bottom Link -->
<p class="mt-xl font-body-md text-on-surface-variant animate-fade-in-up" style="animation-delay: 0.5s;">
            Don't have an account? 
            <a class="text-primary font-bold hover:underline ml-xs" href="#">Register for free</a>
</p>
</main>
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('input');
            
            inputs.forEach(input => {
                // Focus effect for inputs
                input.addEventListener('focus', () => {
                    const card = input.closest('.glass-card');
                    card.classList.add('shadow-primary/20');
                    card.style.borderColor = 'rgba(75, 226, 119, 0.3)';
                });

                input.addEventListener('blur', () => {
                    const card = input.closest('.glass-card');
                    card.classList.remove('shadow-primary/20');
                    card.style.borderColor = 'rgba(255, 255, 255, 0.1)';
                });
            });

            // Password visibility toggle
            const togglePass = document.querySelector('button .material-symbols-outlined:contains("visibility")');
            if (togglePass) {
                togglePass.parentElement.addEventListener('click', () => {
                    const passInput = document.getElementById('password');
                    const isPass = passInput.type === 'password';
                    passInput.type = isPass ? 'text' : 'password';
                    togglePass.textContent = isPass ? 'visibility_off' : 'visibility';
                });
            }
        });
    </script>
</body></html>
