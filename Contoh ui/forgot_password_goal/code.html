<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .energy-gradient {
            background: linear-gradient(135deg, #4be277 0%, #00a572 100%);
        }

        .glass-card {
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-focus-glow:focus {
            box-shadow: 0 0 15px rgba(75, 226, 119, 0.3);
            border-color: #4be277;
            outline: none;
        }

        @keyframes success-pop {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .animate-success {
            animation: success-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen font-body-md selection:bg-primary selection:text-on-primary overflow-x-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-transparent backdrop-blur-xl bg-surface/10 border-b border-white/10 flex items-center justify-between px-margin-mobile h-16">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:opacity-80 transition-opacity active:scale-95 transition-transform text-primary" onclick="window.history.back()">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-display-lg text-display-lg tracking-tighter text-primary italic">GOAL</h1>
<div class="w-10"></div> <!-- Spacer for center alignment -->
</header>
<main class="relative pt-24 pb-12 px-margin-mobile flex flex-col items-center justify-center min-h-screen">
<!-- Background Atmosphere -->
<div class="absolute inset-0 z-0 opacity-20 pointer-events-none overflow-hidden">

</div>
<div class="relative z-10 w-full max-w-md">
<!-- Header Section -->
<div class="mb-lg space-y-sm text-center md:text-left">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface">
                    FORGOT PASSWORD?
                </h2>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[320px] mx-auto md:mx-0">
                    No sweat. Enter your email and we'll get you back on the pitch in no time.
                </p>
</div>
<!-- Form Container -->
<div class="glass-card p-lg rounded-xl space-y-lg transition-all duration-500" id="forgot-password-form">
<div class="space-y-md">
<label class="font-label-sm text-label-sm uppercase tracking-widest text-primary" for="email">
                        Email Address
                    </label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant material-symbols-outlined">mail</span>
<input class="w-full bg-surface-container-low border border-white/10 rounded-lg py-4 pl-12 pr-4 text-on-surface font-body-md input-focus-glow transition-all" id="email" placeholder="coach@stadium.com" type="email"/>
</div>
</div>
<button class="energy-gradient w-full py-4 rounded-xl font-headline-lg-mobile text-on-primary-container uppercase tracking-tight flex items-center justify-center gap-2 shadow-[0_10px_30px_rgba(0,0,0,0.5)] hover:scale-[1.02] active:scale-95 transition-all duration-200" id="submit-btn" onclick="handleReset()">
                    Send Reset Link
                    <span class="material-symbols-outlined">send</span>
</button>
<div class="text-center pt-md">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center gap-2" href="/login">
                        Back to Login
                    </a>
</div>
</div>
<!-- Success State (Hidden by default) -->
<div class="hidden flex flex-col items-center justify-center text-center space-y-lg p-xl" id="success-state">
<div class="w-32 h-32 relative">

</div>
<div class="space-y-sm">
<h3 class="font-headline-lg-mobile text-headline-lg-mobile text-primary">LINK SENT!</h3>
<p class="font-body-lg text-body-lg text-on-surface-variant">
                        Check your inbox. We've sent instructions to reset your password.
                    </p>
</div>
<button class="border border-primary text-primary px-lg py-3 rounded-full font-label-sm text-label-sm uppercase hover:bg-primary/10 transition-colors" onclick="location.reload()">
                    Resend Email
                </button>
</div>
</div>
</main>
<!-- Footer Decorative Element -->
<div class="fixed bottom-0 left-0 w-full h-1 bg-surface-container-highest overflow-hidden">
<div class="h-full bg-primary w-0 transition-all duration-1000" id="progress-bar"></div>
</div>
<script>
        function handleReset() {
            const emailInput = document.getElementById('email');
            const form = document.getElementById('forgot-password-form');
            const success = document.getElementById('success-state');
            const btn = document.getElementById('submit-btn');
            const progressBar = document.getElementById('progress-bar');

            if (!emailInput.value || !emailInput.value.includes('@')) {
                emailInput.classList.add('border-error');
                setTimeout(() => emailInput.classList.remove('border-error'), 2000);
                return;
            }

            // UI Feedback
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span>';
            btn.disabled = true;
            progressBar.style.width = '100%';

            // Simulate API Call
            setTimeout(() => {
                form.classList.add('opacity-0', 'scale-95', 'pointer-events-none');
                
                setTimeout(() => {
                    form.classList.add('hidden');
                    success.classList.remove('hidden');
                    success.classList.add('animate-success');
                }, 300);
            }, 1200);
        }

        // Ripple Effect on Main Button
        document.getElementById('submit-btn').addEventListener('click', function(e) {
            let x = e.clientX - e.target.offsetLeft;
            let y = e.clientY - e.target.offsetTop;
            let ripple = document.createElement('span');
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            this.appendChild(ripple);
            setTimeout(() => { ripple.remove(); }, 600);
        });
    </script>
</body></html>
