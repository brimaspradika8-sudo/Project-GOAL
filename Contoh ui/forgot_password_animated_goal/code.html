<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Goal - Forgot Password</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary": "#003824",
                    "error-container": "#93000a",
                    "on-primary-fixed": "#002109",
                    "surface-variant": "#353534",
                    "on-primary-fixed-variant": "#005321",
                    "surface": "#131313",
                    "inverse-on-surface": "#313030",
                    "tertiary-fixed": "#ffdad5",
                    "primary-fixed-dim": "#4ae176",
                    "surface-tint": "#4ae176",
                    "on-error-container": "#ffdad6",
                    "on-background": "#e5e2e1",
                    "surface-container-lowest": "#0e0e0e",
                    "primary-container": "#22c55e",
                    "on-tertiary-container": "#76231b",
                    "primary-fixed": "#6bff8f",
                    "inverse-surface": "#e5e2e1",
                    "secondary-fixed-dim": "#4edea3",
                    "inverse-primary": "#006e2f",
                    "on-tertiary": "#60130d",
                    "tertiary-container": "#ff8b7c",
                    "outline": "#869585",
                    "outline-variant": "#3d4a3d",
                    "on-primary": "#003915",
                    "error": "#ffb4ab",
                    "on-tertiary-fixed": "#410001",
                    "primary": "#4be277",
                    "on-surface-variant": "#bccbb9",
                    "on-secondary-container": "#00311f",
                    "secondary-fixed": "#6ffbbe",
                    "on-secondary-fixed": "#002113",
                    "on-tertiary-fixed-variant": "#7f2a21",
                    "on-primary-container": "#004b1e",
                    "on-error": "#690005",
                    "secondary-container": "#00a572",
                    "surface-bright": "#393939",
                    "surface-container-high": "#2a2a2a",
                    "surface-container-low": "#1c1b1b",
                    "tertiary": "#ffb5ab",
                    "tertiary-fixed-dim": "#ffb4a9",
                    "background": "#131313",
                    "surface-container": "#201f1f",
                    "surface-container-highest": "#353534",
                    "surface-dim": "#131313",
                    "on-secondary-fixed-variant": "#005236",
                    "secondary": "#4edea3",
                    "on-surface": "#e5e2e1"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "md": "16px",
                    "xs": "4px",
                    "lg": "24px",
                    "sm": "8px",
                    "margin-mobile": "20px",
                    "margin-desktop": "64px",
                    "xl": "40px",
                    "gutter": "16px"
            },
            "fontFamily": {
                    "body-md": ["Archivo Narrow"],
                    "label-sm": ["Archivo Narrow"],
                    "title-md": ["Archivo Narrow"],
                    "body-lg": ["Archivo Narrow"],
                    "headline-lg-mobile": ["Anton"],
                    "headline-lg": ["Anton"],
                    "display-lg": ["Anton"]
            },
            "fontSize": {
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],

                    "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "0.02em", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .energy-gradient {
            background: linear-gradient(135deg, #4be277 0%, #00a572 100%);
        }

        .glass-card {
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-focus-glow:focus {
            box-shadow: 0 0 15px rgba(75, 226, 119, 0.4);
            border-color: #4be277;
            outline: none;
        }

        @keyframes success-pop {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .animate-success {
            animation: success-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reveal-element {
            opacity: 0;
            animation: fade-in-up 0.8s ease-out forwards;
        }

        .link-underline {
            position: relative;
        }
        .link-underline::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -2px;
            left: 0;
            background-color: currentColor;
            transition: width 0.3s ease;
        }
        .link-underline:hover::after {
            width: 100%;
        }

        @keyframes plane-fly {
            0% { transform: translate(0, 0); opacity: 1; }
            50% { transform: translate(20px, -20px); opacity: 0; }
            51% { transform: translate(-20px, 20px); opacity: 0; }
            100% { transform: translate(0, 0); opacity: 1; }
        }
        .animate-plane {
            animation: plane-fly 0.6s ease-in-out infinite;
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen font-body-md selection:bg-primary selection:text-on-primary overflow-x-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-transparent backdrop-blur-xl bg-surface/10 border-b border-white/10 flex items-center justify-between px-margin-mobile h-16 reveal-element" style="animation-delay: 0.1s;">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:opacity-80 transition-opacity active:scale-95 transition-transform text-primary" onclick="window.history.back()">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-display-lg text-display-lg tracking-tighter text-primary italic">GOAL</h1>
<div class="w-10"></div> <!-- Spacer for center alignment -->
</header>
<main class="relative pt-24 pb-12 px-margin-mobile flex flex-col items-center justify-center min-h-screen">
<div class="relative z-10 w-full max-w-md">
<!-- Header Section -->
<div class="mb-lg space-y-sm text-center md:text-left reveal-element" style="animation-delay: 0.2s;">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface">
                    FORGOT PASSWORD?
                </h2>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[320px] mx-auto md:mx-0">
                    No sweat. Enter your email and we'll get you back on the pitch in no time.
                </p>
</div>
<!-- Form Container -->
<div class="glass-card p-lg rounded-xl space-y-lg transition-all duration-500 reveal-element" id="forgot-password-form" style="animation-delay: 0.3s;">
<div class="space-y-md">
<label class="font-label-sm text-label-sm uppercase tracking-widest text-primary" for="email">
                        Email Address
                    </label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant material-symbols-outlined">mail</span>
<input class="w-full bg-surface-container-low border border-white/10 rounded-lg py-4 pl-12 pr-4 text-on-surface font-body-md input-focus-glow transition-all" id="email" placeholder="coach@stadium.com" type="email"/>
</div>
</div>
<button class="energy-gradient w-full py-4 rounded-xl font-headline-lg-mobile text-on-primary-container uppercase tracking-tight flex items-center justify-center gap-2 shadow-[0_10px_30px_rgba(0,0,0,0.3)] hover:scale-[1.02] active:scale-95 transition-all duration-300 overflow-hidden group" id="submit-btn" onclick="handleReset()">
<span id="btn-text">Send Reset Link</span>
<span class="material-symbols-outlined transition-transform duration-300 group-hover:translate-x-1" id="btn-icon">send</span>
</button>
<div class="text-center pt-md">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors inline-flex items-center justify-center gap-2 link-underline" href="/login">
                        Back to Login
                    </a>
</div>
</div>
<!-- Success State (Hidden by default) -->
<div class="hidden flex flex-col items-center justify-center text-center space-y-lg p-xl" id="success-state">
<div class="w-32 h-32 relative flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-[80px]">mark_email_read</span>
</div>
<div class="space-y-sm">
<h3 class="font-headline-lg-mobile text-headline-lg-mobile text-primary">LINK SENT!</h3>
<p class="font-body-lg text-body-lg text-on-surface-variant">
                        Check your inbox. We've sent instructions to reset your password.
                    </p>
</div>
<button class="border border-primary text-primary px-lg py-3 rounded-full font-label-sm text-label-sm uppercase hover:bg-primary/10 transition-colors" onclick="location.reload()">
                    Resend Email
                </button>
</div>
</div>
</main>
<!-- Footer Decorative Element -->
<div class="fixed bottom-0 left-0 w-full h-1 bg-surface-container-highest overflow-hidden">
<div class="h-full bg-primary w-0 transition-all duration-1000" id="progress-bar"></div>
</div>
<script>
        function handleReset() {
            const emailInput = document.getElementById('email');
            const form = document.getElementById('forgot-password-form');
            const success = document.getElementById('success-state');
            const btn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnIcon = document.getElementById('btn-icon');
            const progressBar = document.getElementById('progress-bar');

            if (!emailInput.value || !emailInput.value.includes('@')) {
                emailInput.classList.add('border-error', 'animate-shake');
                setTimeout(() => emailInput.classList.remove('border-error'), 2000);
                return;
            }

            // Button Action Transition
            btn.disabled = true;
            btnText.style.opacity = '0';
            
            setTimeout(() => {
                btnText.innerText = 'Sending...';
                btnText.style.opacity = '1';
                btnIcon.innerText = 'flight_takeoff';
                btnIcon.classList.add('animate-plane');
            }, 200);

            progressBar.style.width = '100%';

            // Simulate API Call
            setTimeout(() => {
                form.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
                
                setTimeout(() => {
                    form.classList.add('hidden');
                    success.classList.remove('hidden');
                    success.classList.add('animate-success');
                }, 400);
            }, 1800);
        }
    </script>
</body></html>
