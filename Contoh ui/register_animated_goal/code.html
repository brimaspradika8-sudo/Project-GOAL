<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Anton&amp;family=Archivo+Narrow:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        @keyframes pulse-subtle {
            0% { transform: scale(1); box-shadow: 0 0 30px rgba(75, 226, 119, 0.2); }
            50% { transform: scale(1.02); box-shadow: 0 0 45px rgba(75, 226, 119, 0.4); }
            100% { transform: scale(1); box-shadow: 0 0 30px rgba(75, 226, 119, 0.2); }
        }
        @keyframes checkbox-bounce {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .stagger-item {
            opacity: 0;
            animation: fadeInUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        .input-stagger {
            opacity: 0;
            animation: slideInRight 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        .button-pulse {
            animation: pulse-subtle 3s infinite ease-in-out;
        }
        .checkbox-bounce:checked {
            animation: checkbox-bounce 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .back-button-hover:hover .material-symbols-outlined {
            transform: translateX(-4px);
            transition: transform 0.2s ease;
        }
        .glass-panel {
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .energy-gradient {
            background: linear-gradient(135deg, #4be277 0%, #00a572 100%);
        }
        input:focus {
            box-shadow: 0 0 15px rgba(75, 226, 119, 0.3);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary": "#003824",
                        "error-container": "#93000a",
                        "on-primary-fixed": "#002109",
                        "surface-variant": "#353534",
                        "on-primary-fixed-variant": "#005321",
                        "surface": "#131313",
                        "inverse-on-surface": "#313030",
                        "tertiary-fixed": "#ffdad5",
                        "primary-fixed-dim": "#4ae176",
                        "surface-tint": "#4ae176",
                        "on-error-container": "#ffdad6",
                        "on-background": "#e5e2e1",
                        "surface-container-lowest": "#0e0e0e",
                        "primary-container": "#22c55e",
                        "on-tertiary-container": "#76231b",
                        "primary-fixed": "#6bff8f",
                        "inverse-surface": "#e5e2e1",
                        "secondary-fixed-dim": "#4edea3",
                        "inverse-primary": "#006e2f",
                        "on-tertiary": "#60130d",
                        "tertiary-container": "#ff8b7c",
                        "outline": "#869585",
                        "outline-variant": "#3d4a3d",
                        "on-primary": "#003915",
                        "error": "#ffb4ab",
                        "on-tertiary-fixed": "#410001",
                        "primary": "#4be277",
                        "on-surface-variant": "#bccbb9",
                        "on-secondary-container": "#00311f",
                        "secondary-fixed": "#6ffbbe",
                        "on-secondary-fixed": "#002113",
                        "on-tertiary-fixed-variant": "#7f2a21",
                        "on-primary-container": "#004b1e",
                        "on-error": "#690005",
                        "secondary-container": "#00a572",
                        "surface-bright": "#393939",
                        "surface-container-high": "#2a2a2a",
                        "surface-container-low": "#1c1b1b",
                        "tertiary": "#ffb5ab",
                        "tertiary-fixed-dim": "#ffb4a9",
                        "background": "#131313",
                        "surface-container": "#201f1f",
                        "surface-container-highest": "#353534",
                        "surface-dim": "#131313",
                        "on-secondary-fixed-variant": "#005236",
                        "secondary": "#4edea3",
                        "on-surface": "#e5e2e1"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "16px",
                        "xs": "4px",
                        "lg": "24px",
                        "sm": "8px",
                        "margin-mobile": "20px",
                        "margin-desktop": "64px",
                        "xl": "40px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "body-md": ["Archivo Narrow"],
                        "label-sm": ["Archivo Narrow"],
                        "title-md": ["Archivo Narrow"],
                        "body-lg": ["Archivo Narrow"],
                        "headline-lg-mobile": ["Anton"],
                        "headline-lg": ["Anton"],
                        "display-lg": ["Anton"]
                    },
                    "fontSize": {
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                        "title-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "26px", "fontWeight": "400"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "1.2", "fontWeight": "400"}],
                        "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "400"}],
                        "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "0.02em", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md relative overflow-x-hidden">
<!-- Ambient Background Effect -->
<div class="fixed inset-0 pointer-events-none z-0">
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-5%] right-[-5%] w-[40%] h-[40%] bg-secondary/10 rounded-full blur-[100px]"></div>
</div>
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 bg-transparent backdrop-blur-xl border-b border-white/10 flex items-center justify-between px-margin-mobile h-16">
<button class="back-button-hover text-primary hover:opacity-80 transition-opacity active:scale-95 transition-transform" onclick="window.history.back()">
<span class="material-symbols-outlined transition-transform duration-200" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-display-lg text-headline-lg-mobile tracking-tighter text-primary italic">GOAL</h1>
<div class="w-6"></div> <!-- Spacer for center alignment -->
</header>
<main class="flex-1 flex flex-col items-center justify-center pt-24 pb-12 px-margin-mobile z-10">
<div class="w-full max-w-md">
<!-- Header Section -->
<div class="stagger-item mb-xl text-center" style="animation-delay: 0.1s">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-white mb-2">JOIN THE SQUAD</h2>
<p class="text-on-surface-variant font-body-md">Create your profile to start booking pitches.</p>
</div>
<!-- Form -->
<form class="space-y-lg">
<!-- Name Input -->
<div class="input-stagger flex flex-col space-y-sm" style="animation-delay: 0.2s">
<label class="font-label-sm text-label-sm text-on-surface-variant px-1">FULL NAME</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors" data-icon="person">person</span>
<input class="w-full bg-surface-container-low border border-white/10 rounded-xl py-4 pl-12 pr-4 text-white placeholder:text-on-surface-variant focus:outline-none focus:border-primary transition-all font-body-md" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email Input -->
<div class="input-stagger flex flex-col space-y-sm" style="animation-delay: 0.3s">
<label class="font-label-sm text-label-sm text-on-surface-variant px-1">EMAIL ADDRESS</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors" data-icon="mail">mail</span>
<input class="w-full bg-surface-container-low border border-white/10 rounded-xl py-4 pl-12 pr-4 text-white placeholder:text-on-surface-variant focus:outline-none focus:border-primary transition-all font-body-md" placeholder="john@example.com" type="email"/>
</div>
</div>
<!-- Phone Input -->
<div class="input-stagger flex flex-col space-y-sm" style="animation-delay: 0.4s">
<label class="font-label-sm text-label-sm text-on-surface-variant px-1">PHONE NUMBER</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors" data-icon="phone">phone</span>
<input class="w-full bg-surface-container-low border border-white/10 rounded-xl py-4 pl-12 pr-4 text-white placeholder:text-on-surface-variant focus:outline-none focus:border-primary transition-all font-body-md" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<!-- Password Input -->
<div class="input-stagger flex flex-col space-y-sm" style="animation-delay: 0.5s">
<label class="font-label-sm text-label-sm text-on-surface-variant px-1">PASSWORD</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-low border border-white/10 rounded-xl py-4 pl-12 pr-12 text-white placeholder:text-on-surface-variant focus:outline-none focus:border-primary transition-all font-body-md" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-white transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Terms & Conditions -->
<div class="stagger-item flex items-center space-x-md" style="animation-delay: 0.6s">
<div class="relative flex items-center">
<input class="peer appearance-none w-6 h-6 border border-white/10 rounded-lg bg-surface-container-low checked:bg-primary checked:border-primary transition-all cursor-pointer checkbox-bounce" id="terms" type="checkbox"/>
<span class="material-symbols-outlined absolute text-on-primary text-[18px] opacity-0 peer-checked:opacity-100 left-1/2 -translate-x-1/2 pointer-events-none" data-icon="check" style="font-variation-settings: 'wght' 700;">check</span>
</div>
<label class="text-on-surface-variant text-body-md cursor-pointer select-none" for="terms">
                        I agree to the <a class="text-primary hover:underline" href="#">Terms &amp; Conditions</a>
</label>
</div>
<!-- CTA Button -->
<div class="stagger-item pt-md" style="animation-delay: 0.7s">
<button class="energy-gradient w-full py-4 rounded-xl font-headline-lg-mobile text-on-primary active:scale-[0.98] transition-all button-pulse hover:shadow-[0_0_40px_rgba(75,226,119,0.3)]" type="button">
                        CREATE ACCOUNT
                    </button>
</div>
</form>
<!-- Back to Login -->
<div class="stagger-item mt-xl text-center" style="animation-delay: 0.8s">
<p class="text-on-surface-variant font-body-md">
                    Already have an account? 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">Log In</a>
</p>
</div>
</div>
</main>
<!-- Visual Accents: Soccer Texture Overlay -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] z-0 mix-blend-overlay" data-alt="A macro high-contrast photograph of a professional soccer ball's textured surface, highlighting geometric pentagonal patterns and intricate stitching. The lighting is dramatic and moody, emphasizing a dark-mode athletic aesthetic with deep shadows and sharp, crisp highlights on the leather-like material." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDNTjXWV-5WfMneiIfcFfsd7qSzB9IH7e_zg_7tKbQw_qXNOZqnx0KYhyLlripivkH4aUt5uUktJlQW2eZfhowzSZUpLQYahjqgkmHV1OaCZcGpQ_xbvlV8c1JdH2cWX7-aje6FiQb0jSQ286nf7JLFpxoVDq5n9ueyIaZqCN0_-W7TSuXtMPAFOexj4pWr_TJfzAsSSxCozvyu6Vn4srJ_Lu5XKIbSPwX4Jk-eEpTkSAg5QYIkKEJA4pcq2yuTC9LmKCqoPyBpEVTs')"></div>
<script>
        // Micro-interactions for button and inputs
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });

        // Add a subtle magnetic effect to the main CTA
        const cta = document.querySelector('.energy-gradient');
        cta.addEventListener('mousemove', (e) => {
            const rect = cta.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            cta.style.setProperty('--x', `${x}px`);
            cta.style.setProperty('--y', `${y}px`);
        });
    </script>
</body></html>
